<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wënṯol Converter</title>

<style>

body {
    font-family: sans-serif;
    text-align: center;
    margin: 15px;
}

h1 {
    margin-bottom: 15px;
}

textarea {
    width: 95%;
    height: 140px;
    font-size: 22px;
    padding: 10px;
    box-sizing: border-box;
}

button {
    font-size: 18px;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
}

#result {
    width: 95%;
    min-height: 120px;
    border: 1px solid #555;
    margin: auto;
    padding: 10px;
    font-size: 22px;
    text-align: left;
    word-wrap: break-word;
}

</style>

</head>

<body>

<h1>Wënṯol Converter</h1>

<textarea id="input"></textarea>

<br>

<button onclick="latinToArabic()">
ラテン → アラビア
</button>

<button onclick="arabicToLatin()">
アラビア → ラテン
</button>

<button onclick="latinToIPA()">
ラテン → IPA
</button>

<button onclick="arabicToIPA()">
アラビア → IPA
</button>

<button onclick="copyResult()">
結果コピー
</button>

<h2>結果</h2>

<div id="result"></div>


<script>


const latinArabic = [

["aq","يَا"],
["iq","يِا"],
["uq","يُا"],
["eq","يًا"],
["oq","يٍا"],

["äq","ےَا"],
["ïq","ےِا"],
["üq","ےُا"],
["ëq","ےًا"],
["öq","ےٍا"],


["a","يَ"],
["i","يِ"],
["u","يُ"],
["e","يً"],
["o","يٍ"],

["ä","ےَ"],
["ï","ےِ"],
["ü","ےُ"],
["ë","ےً"],
["ö","ےٍ"],


["p","پ"],
["b","ب"],
["m","م"],

["f","ف"],
["v","ۋ"],
["n","ن"],
["ň","ق"],

["t","ت"],
["d","د"],

["k","ك"],
["g","گ"],
["h","ه"],

["ṯ","ث"],
["ḏ","ذ"],

["x","خ"],
["ġ","غ"],

["w","و"],

["s","س"],
["z","ز"],

["r","ر"],
["l","ل"],

["ṡ","ش"],
["ż","ژ"],

["c","ع"],
["j","ي"],
["ǧ","ح"],

["ñ","ة"],

["č","چ"],
["ž","ج"],

["ś","ط"],
["ź","ض"],

["q","ا"]

];


function showResult(text) {

    const result =
        document.getElementById("result");

    result.innerText = text;

}



function latinToArabic() {

    let text =
        document.getElementById("input").value;


    latinArabic.forEach(pair => {

        text =
            text.split(pair[0]).join(pair[1]);

    });


    showResult(text);

}



function arabicToLatin() {

    let text =
        document.getElementById("input").value;


    for(let i = 0; i < latinArabic.length; i++) {

        const pair = latinArabic[i];

        text =
            text.split(pair[1]).join(pair[0]);

    }


    showResult(text);

}




function latinToIPA() {

    let text =
        document.getElementById("input").value;


    // 母音 + rr → 母音 + ɹ̠
    text = text.replace(
        /([aäeëiïuüoö])rr/g,
        "$1ɹ̠"
    );


    // 母音 + r → 母音 + ɪ
    text = text.replace(
        /([aäeëiïuüoö])r/g,
        "$1ɪ"
    );


    const ipa = [

    ["q","ː"],


    ["a","a"],
    ["ä","ʌ"],
    ["e","ɛ"],
    ["ë","æ"],
    ["i","i"],
    ["ï","y"],
    ["u","ɯ"],
    ["ü","ʊ"],
    ["o","o"],
    ["ö","ɔ"],


    ["p","p"],
    ["b","b"],
    ["m","m"],

    ["f","f"],
    ["v","v"],

    ["n","n"],
    ["ň","ŋ"],
    ["ñ","ɲ"],


    ["t","t"],
    ["d","d"],

    ["ṯ","θ"],
    ["ḏ","ð"],


    ["k","k"],
    ["g","g"],
    ["h","h"],


    ["x","x"],
    ["ġ","ɣ"],

    ["w","w"],


    ["s","s"],
    ["z","z"],

    ["r","ɹ̠"],

    ["l","ɾ"],


    ["ṡ","ʃ"],
    ["ż","ʒ"],


    ["c","ç"],
    ["j","ʝ"],

    ["ǧ","ʁ"],


    ["č","t͡ʃ"],
    ["ž","d͡ʒ"],


    ["ś","t͡s"],
    ["ź","d͡z"]

    ];


    ipa.forEach(pair => {

        text =
            text.split(pair[0]).join(pair[1]);

    });


    showResult(text);

}




function arabicToIPA() {

    let text =
        document.getElementById("input").value;


    // アラビア → ラテン
    for(let i = 0; i < latinArabic.length; i++) {

        const pair = latinArabic[i];

        text =
            text.split(pair[1]).join(pair[0]);

    }


    // 一時的に入力欄へ入れてIPA変換
    const input =
        document.getElementById("input");

    const oldText =
        input.value;


    input.value = text;


    latinToIPA();


    input.value = oldText;

}




function copyResult() {

    const text =
        document.getElementById("result").innerText;


    navigator.clipboard.writeText(text);


    alert("コピーしました");

}


</script>

</body>

</html>
